{% extends "base.html" %}
{% block title %}Entrar — FinTrack{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre para ver sua situação financeira.</p>

    <form method="POST">
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <p class="switch-link">Ainda não tem conta? <a href="/cadastro">Cadastre-se</a></p>
</div>
{% endblock %}
