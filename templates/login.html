<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FinTrack - Login</title>
</head>
<body>
    <h1>Entrar</h1>

    {% with mensagens = get_flashed_messages() %}
        {% if mensagens %}
            <ul>
            {% for m in mensagens %}
                <li>{{ m }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Email:</label>
        <input type="email" name="email" required><br><br>

        <label>Senha:</label>
        <input type="password" name="senha" required><br><br>

        <button type="submit">Entrar</button>
    </form>

    <p>Ainda não tem conta? <a href="/cadastro">Cadastre-se</a></p>
</body>
</html>
